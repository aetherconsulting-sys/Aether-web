        <ul class="service-card__list">
          <li data-i18n="svc2.l1"></li>

<!-- ── CONTACTO ─────────────────────────────────────── -->
<section class="contact section" id="contacto">
  <div class="container">
    <div class="contact__grid">
      <div>
        <span class="eyebrow fade-in" data-i18n="cont.eyebrow"></span>
        <h2 class="fade-in" style="margin:.6rem 0 1rem" data-i18n="cont.h2"></h2>
        <p class="fade-in" data-i18n="cont.p"></p>
        <div style="margin-top: 2.5rem;">
          <div class="contact__item fade-in">
            <div class="contact__item-icon">✉️</div>
            <div>
              <h4 data-i18n="cont.i1.h"></h4>
              <p>aetherconsulting6@gmail.com</p>
            </div>
          </div>
          <div class="contact__item fade-in">
            <div class="contact__item-icon">🌐</div>
            <div>
              <h4 data-i18n="cont.i2.h"></h4>
              <p>aetherconsulting.netlify.app/</p>
            </div>
          </div>
          <div class="contact__item fade-in">
            <div class="contact__item-icon">📍</div>
            <div>
              <h4 data-i18n="cont.i3.h"></h4>
              <p data-i18n="cont.i3.p"></p>
            </div>
          </div>
        </div>
      </div>
      <div class="contact__form-wrap fade-in">
        <form id="contactForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="form.name"></label>
              <input type="text" name="nombre" data-i18n-placeholder="form.name" required>
            </div>
            <div class="form-group">
              <label data-i18n="form.email"></label>
              <input type="email" name="email" data-i18n-placeholder="form.email" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="form.company"></label>
              <input type="text" name="empresa" data-i18n-placeholder="form.company">
            </div>
            <div class="form-group">
              <label data-i18n="form.service"></label>
              <select name="servicio">
                <option value="" data-i18n="form.svc0"></option>
                <option value="intermediacion" data-i18n="form.svc1"></option>
                <option value="ingenieria" data-i18n="form.svc2"></option>
                <option value="consultoria" data-i18n="form.svc3"></option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="form.msg"></label>
            <textarea name="mensaje" data-i18n-placeholder="form.msg" required></textarea>
          </div>
          <button type="submit" class="form-submit" data-i18n="form.submit"></button>
          <p style="font-size:.75rem; color:var(--lgray); margin-top:.8rem; text-align:center" data-i18n="form.legal"></p>
        </form>
        <div id="formSuccess" class="form-success">✅ <span data-i18n="form.success"></span></div>
      </div>
    </div>
  </div>
</section>
